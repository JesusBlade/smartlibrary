<div class="container-fluid mt-4 page-shell">

  <div class="row align-items-center mb-4 page-header">
    <div class="col-md-8">
      <h2 class="page-title mb-1">
        <i class="bi bi-person-lines-fill text-primary me-2"></i>
        Gestión de Autores
      </h2>
      <p class="page-subtitle mb-0">
        Administra los autores
      </p>
    </div>

    <div class="col-md-4 text-md-end mt-3 mt-md-0">
      <button type="button" class="btn btn-primary px-3" (click)="abrirModalNuevo()">
        <i class="bi bi-plus-circle me-2"></i>
        Nuevo Autor
      </button>
    </div>
  </div>

  <div class="card page-card shadow-sm border-0">
    <div class="card-body p-3 p-md-4">
      <div class="row mb-3 g-3 align-items-center">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" placeholder="Buscar autor..." name="buscar" [(ngModel)]="textoBusqueda">
          </div>
        </div>
        <div class="col-md-4 text-md-end">
          <span class="badge bg-primary fs-6">{{ autoresFiltrados().length }} Autores</span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th><i class="bi bi-person me-1"></i>Nombre</th>
              <th><i class="bi bi-globe-americas me-1"></i>Nacionalidad</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let autor of autoresFiltrados()">
              <td class="fw-semibold">{{ autor.nombreAutor }}</td>
              <td>{{ autor.nacionalidad }}</td>
              <td class="text-center">
                <button type="button" class="btn btn-outline-primary btn-sm me-2" title="Editar" (click)="editar(autor)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button type="button" class="btn btn-outline-danger btn-sm" title="Eliminar" (click)="eliminar(autor.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="autores.length == 0">
              <td colspan="3" class="text-center py-5">
                <i class="bi bi-person-x fs-1 text-secondary"></i>
                <p class="mt-3 mb-0 text-muted">No existen autores registrados.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" [class.show]="mostrarFormulario" [style.display]="mostrarFormulario ? 'block' : 'none'" tabindex="-1" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h5 class="modal-title mb-0 d-flex align-items-center">
            <i class="bi bi-person-plus me-2"></i>
            {{ editando ? 'Editar Autor' : 'Registro de Autor' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" (click)="cerrarModal()"></button>
        </div>
        <div class="modal-body">
          <form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>
            <div class="mb-3">
              <label class="form-label">Nombre del Autor</label>
              <input type="text" class="form-control" name="nombreAutor" [(ngModel)]="autorEditar.nombreAutor" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Nacionalidad</label>
              <input type="text" class="form-control" name="nacionalidad" [(ngModel)]="autorEditar.nacionalidad" required>
            </div>
            <div class="text-end mt-4">
              <button type="button" class="btn btn-outline-secondary me-2" (click)="cerrarModal()">
                <i class="bi bi-x-circle me-2"></i>Cancelar
              </button>
              <button type="submit" class="btn btn-success" [disabled]="miForm.invalid">
                <i class="bi bi-check-circle me-2"></i>
                {{ editando ? 'Actualizar' : 'Guardar' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop fade show" *ngIf="mostrarFormulario"></div>
</div>

<div class="form-container">
  <h2>Nuevo Libro</h2>
  <form [formGroup]="miForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Autor:</label>
      <select formControlName="idAutor">
        <option value="">Seleccione un autor</option>
        <option *ngFor="let a of autores" [value]="a.id">
          {{ a.nombre }} {{ a.apellido }}
        </option>
      </select>
    </div>
    <div class="form-group">
      <label>Categoría:</label>
      <select formControlName="idCategoria">
        <option value="">Seleccione una categoría</option>
        <option *ngFor="let c of categorias" [value]="c.id">
          {{ c.nombre }}
        </option>
      </select>
    </div>
    <div class="form-group">
      <label>Título:</label>
      <input type="text" formControlName="titulo">
    </div>
    <div class="form-group">
      <label>Editorial:</label>
      <input type="text" formControlName="editorial">
    </div>
    <div class="form-group">
      <label>Páginas:</label>
      <input type="number" formControlName="paginas">
    </div>
    <div class="form-group">
      <label>Lanzamiento:</label>
      <input type="date" formControlName="lanzamiento">
    </div>
    <button type="submit" [disabled]="miForm.invalid">Guardar Libro</button>
  </form>
</div>

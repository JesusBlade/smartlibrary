<div class="form-container">
  <h2>Nuevo Libro</h2>
  <form [formGroup]="miForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Autor:</label>
      <select formControlName="idAutor">
        <option value="">Seleccione un autor</option>
        <option *ngFor="let a of autores" [value]="a.id">
          {{ a.nombre }} {{ a.apellido }}
        </option>
      </select>
      <div *ngIf="miForm.get('idAutor')?.touched && miForm.get('idAutor')?.invalid">
        <small *ngIf="miForm.get('idAutor')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <div class="form-group">
      <label>Categoría:</label>
      <select formControlName="idCategoria">
        <option value="">Seleccione una categoría</option>
        <option *ngFor="let c of categorias" [value]="c.id">
          {{ c.nombre }}
        </option>
      </select>
      <div *ngIf="miForm.get('idCategoria')?.touched && miForm.get('idCategoria')?.invalid">
        <small *ngIf="miForm.get('idCategoria')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <div class="form-group">
      <label>Título:</label>
      <input type="text" formControlName="titulo">
      <div *ngIf="miForm.get('titulo')?.touched && miForm.get('titulo')?.invalid">
        <small *ngIf="miForm.get('titulo')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <div class="form-group">
      <label>Editorial:</label>
      <input type="text" formControlName="editorial">
      <div *ngIf="miForm.get('editorial')?.touched && miForm.get('editorial')?.invalid">
        <small *ngIf="miForm.get('editorial')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <div class="form-group">
      <label>Páginas:</label>
      <input type="number" formControlName="paginas">
      <div *ngIf="miForm.get('paginas')?.touched && miForm.get('paginas')?.invalid">
        <small *ngIf="miForm.get('paginas')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <div class="form-group">
      <label>Lanzamiento:</label>
      <input type="date" formControlName="lanzamiento">
      <div *ngIf="miForm.get('lanzamiento')?.touched && miForm.get('lanzamiento')?.invalid">
        <small *ngIf="miForm.get('lanzamiento')?.errors?.['required']" style="color: red;">Campo obligatorio</small>
      </div>
    </div>
    <button type="submit" [disabled]="miForm.invalid">Guardar Libro</button>
  </form>
</div>

<div class="container-fluid mt-4 page-shell">

  <div class="row align-items-center mb-4 page-header">
    <div class="col-md-8">
      <h2 class="page-title">
        <i class="bi bi-people text-primary me-2"></i>
        Gestión de Usuarios
      </h2>
      <p class="page-subtitle mb-0">
        Administra los usuarios del sistema
      </p>
    </div>

    <div class="col-md-4 text-md-end mt-3 mt-md-0">
      <button type="button" class="btn btn-primary" (click)="mostrarFormulario=true">
        <i class="bi bi-plus-circle me-2"></i>
        Nuevo Usuario
      </button>
    </div>
  </div>

  <div class="card page-card shadow-sm border-0">
    <div class="card-body">
      <div class="row mb-3 g-3">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" placeholder="Buscar usuario..." name="buscar"
              [(ngModel)]="textoBusqueda">
          </div>
        </div>
        <div class="col-md-4 text-md-end">
          <span class="badge bg-primary fs-6">{{ usuariosFiltrados().length }} Usuarios</span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th><i class="bi bi-person me-1"></i>Persona</th>
              <th><i class="bi bi-person-badge me-1"></i>Usuario</th>
              <th><i class="bi bi-shield-lock me-1"></i>Tipo</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let u of usuariosFiltrados()">
              <td>{{ obtenerPersona(u.idPersona) }}</td>
              <td>{{ u.user }}</td>
              <td>{{ u.tipoUsuario }}</td>
            </tr>
            <tr *ngIf="usuarios.length == 0">
              <td colspan="3" class="text-center py-5">
                <i class="bi bi-person-x fs-1 text-secondary"></i>
                <p class="mt-3 mb-0 text-muted">No existen usuarios registrados.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" [class.show]="mostrarFormulario" [style.display]="mostrarFormulario ? 'block' : 'none'"
    tabindex="-1" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h5 class="modal-title mb-0 d-flex align-items-center">
            <i class="bi bi-person-plus me-2"></i>
            Registro de Usuario
          </h5>
          <button type="button" class="btn-close btn-close-white" (click)="mostrarFormulario=false"></button>
        </div>
        <div class="modal-body">
          <form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>
            <div class="mb-3">
              <label class="form-label">Persona</label>
              <div class="input-group">
                <select class="form-select" name="idPersona" ngModel required #idPersona="ngModel">
                  <option value="">Seleccione una persona</option>
                  <option *ngFor="let p of personas" [value]="p.id">{{ p.nombre }} {{ p.apellido }}</option>
                </select>
                <button type="button" class="btn btn-outline-primary" (click)="mostrarPersona=true">
                  <i class="bi bi-plus-lg"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" name="user" ngModel required>
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" name="password" ngModel required>
            </div>
            <div class="mb-3">
              <label class="form-label">Tipo Usuario</label>
              <select class="form-select" name="tipoUsuario" ngModel required>
                <option value="">Seleccione tipo</option>
                <option value="ADMIN">ADMIN</option>
                <option value="CLIENTE">CLIENTE</option>
              </select>
            </div>
            <div class="text-end mt-4">
              <button type="button" class="btn btn-outline-secondary me-2" (click)="mostrarFormulario=false">
                <i class="bi bi-x-circle me-2"></i>Cancelar
              </button>
              <button type="submit" class="btn btn-success" [disabled]="miForm.invalid">
                <i class="bi bi-check-circle me-2"></i>Guardar Usuario
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" [class.show]="mostrarPersona" [style.display]="mostrarPersona ? 'block' : 'none'"
    tabindex="-1" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title mb-0">
            <i class="bi bi-person-plus me-2"></i>
            Registro de Persona
          </h5>
          <button type="button" class="btn-close btn-close-white" (click)="mostrarPersona=false"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" [(ngModel)]="personaNueva.nombre" name="nombreNueva">
          </div>
          <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" class="form-control" [(ngModel)]="personaNueva.apellido" name="apellidoNueva">
          </div>
          <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="number" class="form-control" [(ngModel)]="personaNueva.dni" name="dniNuevo">
          </div>
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" [(ngModel)]="personaNueva.correo" name="correoNuevo">
          </div>
          <div class="text-end mt-3">
            <button type="button" class="btn btn-outline-secondary me-2" (click)="mostrarPersona=false">
              <i class="bi bi-x-circle me-2"></i>Cancelar
            </button>
            <button type="button" class="btn btn-success" (click)="guardarPersona()">
              <i class="bi bi-check-circle me-2"></i>Guardar Persona
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop fade show" *ngIf="mostrarFormulario || mostrarPersona"></div>
</div>

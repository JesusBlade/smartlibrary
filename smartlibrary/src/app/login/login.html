<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center py-4">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-lg-10">
      <div class="card border-0 shadow-lg overflow-hidden rounded-4">
        <div class="row g-0">
          <div class="col-lg-6 bg-primary text-white p-4 p-lg-5 d-flex flex-column justify-content-center">
            <h1 class="display-6 fw-bold mb-3">
              <i class="bi bi-book-half me-2"></i>SmartLibrary
            </h1>
            <p class="lead mb-0">
              Sistema de gestión de biblioteca con una experiencia más clara, rápida y moderna.
            </p>
          </div>

          <div class="col-lg-6 p-4 p-lg-5 bg-white">
            <form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>
              <h2 class="fw-bold mb-4">Iniciar Sesión</h2>

              <div *ngIf="errorMensaje" class="alert alert-danger py-2 mb-3" role="alert">
                {{ errorMensaje }}
              </div>

              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="user" ngModel required #user="ngModel" placeholder="Ingrese su usuario">
                <div *ngIf="user && user.invalid && user.touched" class="form-text text-danger mt-1">
                  El usuario es obligatorio.
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" ngModel required #password="ngModel" placeholder="Ingrese su contraseña">
                <div *ngIf="password && password.invalid && password.touched" class="form-text text-danger mt-1">
                  La contraseña es obligatoria.
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100" [disabled]="miForm.invalid">
                <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

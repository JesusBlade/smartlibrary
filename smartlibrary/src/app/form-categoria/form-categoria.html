<div class="container-fluid mt-4 page-shell">

  <div class="row align-items-center mb-4 page-header">
    <div class="col-md-8">
      <h2 class="page-title">
        <i class="bi bi-tags text-primary me-2"></i>
        Gestión de Categorías
      </h2>
      <p class="page-subtitle mb-0">
        Organiza y consulta las categorías de la biblioteca
      </p>
    </div>

    <div class="col-md-4 text-md-end mt-3 mt-md-0">
      <button type="button" class="btn btn-primary" (click)="mostrarFormulario=true">
        <i class="bi bi-plus-circle me-2"></i>
        Nueva Categoría
      </button>
    </div>
  </div>

  <div class="card page-card shadow-sm border-0">
    <div class="card-body">
      <div class="row mb-3 g-3">
        <div class="col-md-8">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" placeholder="Buscar categoría..." name="buscar" [(ngModel)]="textoBusqueda">
          </div>
        </div>
        <div class="col-md-4 text-md-end">
          <span class="badge bg-primary fs-6">{{ categoriasFiltradas().length }} Categorías</span>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
          <thead>
            <tr>
              <th><i class="bi bi-tag me-1"></i>Categoría</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let categoria of categoriasFiltradas()">
              <td class="fw-semibold">{{ categoria.categoria }}</td>
              <td class="text-center">
                <button type="button" class="btn btn-outline-primary btn-sm me-2" title="Editar" (click)="editar(categoria)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button type="button" class="btn btn-outline-danger btn-sm" title="Eliminar" (click)="eliminar(categoria.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
            <tr *ngIf="categorias.length == 0">
              <td colspan="2" class="text-center py-5">
                <i class="bi bi-tags fs-1 text-secondary"></i>
                <p class="mt-3 mb-0 text-muted">No existen categorías registradas.</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal fade" [class.show]="mostrarFormulario" [style.display]="mostrarFormulario ? 'block' : 'none'" tabindex="-1" role="dialog" aria-modal="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h5 class="modal-title mb-0 d-flex align-items-center">
            <i class="bi bi-tag-fill me-2"></i>
            {{ editando ? 'Editar Categoría' : 'Registro de Categoría' }}
          </h5>
          <button type="button" class="btn-close btn-close-white" (click)="mostrarFormulario=false"></button>
        </div>
        <div class="modal-body">
          <form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>
            <div class="mb-3">
              <label class="form-label">Nombre de la Categoría</label>
              <input type="text" class="form-control" name="categoria" [(ngModel)]="categoriaEditar.categoria" required>
            </div>
            <div class="text-end mt-4">
              <button type="button" class="btn btn-outline-secondary me-2" (click)="mostrarFormulario=false">
                <i class="bi bi-x-circle me-2"></i>Cancelar
              </button>
              <button type="submit" class="btn btn-success" [disabled]="miForm.invalid">
                <i class="bi bi-check-circle me-2"></i>
                {{ editando ? 'Actualizar' : 'Guardar' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop fade show" *ngIf="mostrarFormulario"></div>
</div>

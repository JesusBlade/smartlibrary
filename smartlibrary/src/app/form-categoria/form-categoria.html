<form #miForm="ngForm" (ngSubmit)="onSubmit(miForm)" novalidate>

  <div>
    <label>Categoría</label>
    <input type="text" name="categoria" ngModel required #categoria="ngModel">
  </div>

  <div *ngIf="categoria && categoria.invalid && categoria.touched">
    <div *ngIf="categoria.errors?.['required']">
      Campo obligatorio
    </div>
  </div>

  <button type="submit" [disabled]="miForm.invalid">
    Guardar
  </button>

</form>
